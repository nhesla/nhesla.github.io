name: Build and Deploy Deck Investigator

on:
  push:
    branches:
      - main
    paths:
      - 'react-app-deck-investigator/development/**'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: react-app-deck-investigator/development/package-lock.json

      - name: Install dependencies
        working-directory: react-app-deck-investigator/development
        run: npm ci

      - name: Build
        working-directory: react-app-deck-investigator/development
        run: npm run build

      - name: Extract hashed asset filenames
        id: assets
        run: |
          JS_FILE=$(ls react-app-deck-investigator/development/dist/assets/*.js | xargs basename)
          CSS_FILE=$(ls react-app-deck-investigator/development/dist/assets/*.css | xargs basename)
          echo "js=$JS_FILE" >> $GITHUB_OUTPUT
          echo "css=$CSS_FILE" >> $GITHUB_OUTPUT

      - name: Copy build assets to portfolio directory
        run: |
          rm -rf react-app-deck-investigator/assets
          cp -r react-app-deck-investigator/development/dist/assets react-app-deck-investigator/assets

      - name: Patch index.html with correct asset filenames
        run: |
          sed -i \
            "s|assets/index-[^\"]*\.js|assets/${{ steps.assets.outputs.js }}|g" \
            react-app-deck-investigator/index.html
          sed -i \
            "s|assets/index-[^\"]*\.css|assets/${{ steps.assets.outputs.css }}|g" \
            react-app-deck-investigator/index.html

      - name: Commit and push built files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add react-app-deck-investigator/
          git diff --staged --quiet || git commit -m "chore: rebuild deck investigator [skip ci]"
          git push