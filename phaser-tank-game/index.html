<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tank Game — nhesla</title>
  <link rel="stylesheet" href="../assets/style.css"/>
</head>
<body>

  <div id="site-nav"></div>
  <script src="../assets/nav.js"></script>

  <div class="page-header">
    <h1>Tank Game</h1>
    <div class="tag-row">
      <span class="tag tag-blue">JavaScript</span>
      <span class="tag tag-blue">Phaser.js</span>
      <span class="tag tag-neutral">School</span>
    </div>
  </div>

  <div class="project-layout">

    <!-- EMBED -->
    <div class="embed-col">
      <div class="embed-wrap">
        <iframe src="game-embed.html" title="Tank Game"></iframe>
      </div>
      <div class="embed-bar">
        <div class="embed-dot"></div>
        Tank Game — Phaser.js · WASD move · Mouse aim/shoot · Space jump
      </div>
    </div>

    <!-- DEV NOTES -->
    <div class="notes-col">
      <div class="notes-header">
        <span class="notes-heading">// Dev Notes</span>
      </div>
      <div class="notes-body">

        <div class="note-block">
          <div class="note-label note-label-green">What went well</div>
          <div class="note-text">
            <p>Write your notes here.</p>
          </div>
        </div>

        <div class="note-divider"></div>

        <div class="note-block">
          <div class="note-label note-label-blue">What I learned</div>
          <div class="note-text">
            <p>Write your notes here.</p>
          </div>
        </div>

        <div class="note-divider"></div>

        <div class="note-block">
          <div class="note-label note-label-red">Mistakes & what I'd do differently</div>
          <div class="note-text">
            <p>Write your notes here.</p>
            <!-- To add an image:
            <img class="note-img" src="../assets/images/tank-game-screenshot.png" alt="description" />
            -->
          </div>
        </div>

      </div>
    </div>
  </div>

  <div id="other-projects"></div>
  
<script>
  const gameFrame = document.querySelector('.embed-wrap iframe');
  gameFrame.addEventListener('load', () => gameFrame.contentWindow.focus());
  gameFrame.addEventListener('click', () => gameFrame.contentWindow.focus());
</script>
</body>
</html>
