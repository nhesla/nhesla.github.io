<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Deck Investigator — nhesla</title>
  <link rel="stylesheet" href="../assets/style.css"/>
  <style>
    /* Default: notes hidden, embed takes full width */
    #projectLayout {
      grid-template-columns: 1fr 0px;
    }
    #notesCol {
      display: none;
    }

    /* Notes visible */
    #projectLayout.notes-visible {
      grid-template-columns: 1fr 380px;
    }
    #projectLayout.notes-visible #notesCol {
      display: flex;
    }

    .notes-toggle-btn {
      background: none;
      border: 1px solid #445;
      border-radius: 4px;
      color: #888;
      font-size: 11px;
      font-family: monospace;
      padding: 3px 10px;
      cursor: pointer;
      letter-spacing: 0.05em;
      margin-left: 8px;
    }
    .notes-toggle-btn:hover {
      color: white;
      border-color: #88aaff;
    }
  </style>
</head>
<body>

  <div id="site-nav"></div>
  <script src="../assets/nav.js"></script>

  <div class="page-header">
    <h1>TCG Deck Synergy Visualizer</h1>
    <div class="tag-row">
      <span class="tag tag-blue">React</span>
      <span class="tag tag-blue">TypeScript</span>
      <span class="tag tag-blue">Vite</span>
      <span class="tag tag-blue">APIs</span>
      <span class="tag tag-neutral">Personal</span>
      <button class="notes-toggle-btn" onclick="toggleNotes()" id="notesBtn">
        // Dev Notes ▶
      </button>
    </div>
  </div>

  <div class="project-layout" id="projectLayout">

    <!-- EMBED -->
    <div class="embed-col">
      <div class="embed-wrap">
        <iframe src="app.html" title="TCG Deck Synergy Visualizer"></iframe>
      </div>
      <div class="embed-bar">
        <div class="embed-dot"></div>
        TCG Deck Synergy Visualizer — React · TypeScript · Vite
      </div>
    </div>

    <!-- DEV NOTES -->
    <div class="notes-col" id="notesCol">
      <div class="notes-header">
        <span class="notes-heading">// Dev Notes</span>
      </div>
      <div class="notes-body">

        <div class="note-block">
          <div class="note-label note-label-green">What went well</div>
          <div class="note-text">
            <p>Write your notes here.</p>
          </div>
        </div>

        <div class="note-divider"></div>

        <div class="note-block">
          <div class="note-label note-label-blue">What I learned</div>
          <div class="note-text">
            <p>Write your notes here.</p>
          </div>
        </div>

        <div class="note-divider"></div>

        <div class="note-block">
          <div class="note-label note-label-red">Mistakes &amp; what I'd do differently</div>
          <div class="note-text">
            <p>Write your notes here.</p>
          </div>
        </div>

      </div>
    </div>
  </div>

  <div id="other-projects"></div>

  <script>
    function toggleNotes() {
      const layout = document.getElementById('projectLayout');
      const btn    = document.getElementById('notesBtn');
      const visible = layout.classList.toggle('notes-visible');
      btn.textContent = visible ? '// Dev Notes ◀' : '// Dev Notes ▶';
    }
  </script>

</body>
</html>
