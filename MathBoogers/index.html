<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Math Boogers — nhesla</title>
  <link rel="stylesheet" href="../assets/style.css"/>
  <style>
    .game-and-notes {
      display: flex;
      align-items: flex-start;
      gap: 0;
    }
    .game-frame {
      flex: 1;
      min-width: 0;
      border: 1px solid #2a2a2a;
    }
    .game-frame iframe {
      width: 100%;
      height: calc(100vh - 120px);
      border: none;
      display: block;
    }
    .notes-col {
      transition: width 0.3s ease, opacity 0.3s ease;
    }
    .notes-col.collapsed {
      width: 0 !important;
      overflow: hidden;
      opacity: 0;
      pointer-events: none;
    }
    .notes-toggle-btn {
      background: none;
      border: 1px solid #445;
      border-radius: 4px;
      color: #888;
      font-size: 11px;
      font-family: monospace;
      padding: 3px 10px;
      cursor: pointer;
      letter-spacing: 0.05em;
      margin-left: 8px;
    }
    .notes-toggle-btn:hover { color: white; border-color: #88aaff; }

    @media (max-width: 768px) {
      .game-frame iframe {
        height: calc(100vh - 100px);
      }
    }
  </style>
</head>
<body>

  <div id="site-nav"></div>
  <script src="../assets/nav.js"></script>

  <div class="page-header">
    <h1>Math Boogers — Puzzle Game</h1>
    <div class="tag-row">
      <span class="tag tag-green">JavaScript</span>
      <span class="tag tag-neutral">Personal</span>
      <button class="notes-toggle-btn" id="notesBtn" onclick="toggleNotes()">// Dev Notes ▶</button>
    </div>
  </div>

  <div class="game-and-notes">

    <!-- GAME -->
    <div class="game-frame">
      <iframe src="math_boogers.html" title="Math Boogers"></iframe>
    </div>

    <!-- DEV NOTES -->
    <div class="notes-col" id="notesCol">
      <div class="notes-header">
        <span class="notes-heading">// Dev Notes</span>
      </div>
      <div class="notes-body">

        <div class="note-block">
          <div class="note-label note-label-green">What went well</div>
          <div class="note-text">
            <p>Write your notes here.</p>
          </div>
        </div>

        <div class="note-divider"></div>

        <div class="note-block">
          <div class="note-label note-label-blue">What I learned</div>
          <div class="note-text">
            <p>Write your notes here.</p>
          </div>
        </div>

        <div class="note-divider"></div>

        <div class="note-block">
          <div class="note-label note-label-red">Mistakes &amp; what I'd do differently</div>
          <div class="note-text">
            <p>Write your notes here.</p>
          </div>
        </div>

      </div>
    </div>
  </div>

  <div id="other-projects"></div>

  <script>
    // Default to collapsed on mobile
    var notesCol = document.getElementById('notesCol');
    var notesBtn = document.getElementById('notesBtn');
    var isMobile = window.innerWidth <= 768;
    if (isMobile) notesCol.classList.add('collapsed');

    function toggleNotes() {
      var collapsed = notesCol.classList.toggle('collapsed');
      notesBtn.textContent = collapsed ? '// Dev Notes ▶' : '// Dev Notes ◀';
    }
  </script>

</body>
</html>
